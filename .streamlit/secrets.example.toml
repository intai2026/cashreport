# Copy this file to .streamlit/secrets.toml locally
# In Streamlit Community Cloud, add these values in App > Settings > Secrets

QBO_CLIENT_ID = "your_intuit_client_id"
QBO_CLIENT_SECRET = "your_intuit_client_secret"
QBO_REDIRECT_URI = "https://your-streamlit-app.streamlit.app"
QBO_ENVIRONMENT = "sandbox"

# Optional. Usually realmId comes back from OAuth callback.
# QBO_REALM_ID = "your_qbo_company_id"
